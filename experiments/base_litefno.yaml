model:
  name: litefno
  layers: 8
  width: 64
  rank: 32
training:
  epochs: 200
  batch_size: 512
  lr: 0.01
  lr_step: 100
  lr_gamma: 0.5
  device: cuda
  seed: 1337
  deterministic: false
  eval_every: 1
  eval_splits: [train, valid]
  eval_windows: [[6, 12], [13, 30]]
  test_at_end: true
  checkpoint_dir: null
  checkpoint_every: 25
  checkpoint_best_metric: valid_vrmse
  resume_from: null
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  amp: true
  cudnn_benchmark: true
